<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Jakub News</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="weather-bg"></canvas>

  <header class="top-bar">
    <div class="top-bar__main">
      <div class="top-bar__date-block">
        <div class="top-bar__date-line">
          <span class="top-bar__day" id="day-name">—</span>
          <span class="top-bar__date" id="date-text">—</span>
        </div>
        <div class="top-bar__week" id="week-info">—</div>
      </div>
      <button type="button" id="weather-compact" class="weather-chip" aria-label="Zobrazit předpověď počasí">—</button>
    </div>

    <div class="chips-row">
      <div class="top-bar__chips">
        <span class="chip chip--nameday">
          <span class="chip__icon">🎉</span>
          <span class="chip__text" id="nameday">—</span>
        </span>
        <button type="button" class="chip chip--holiday" id="info-toggle" aria-expanded="false" aria-label="Zobrazit všechny dnešní mezinárodní dny">
          <span class="chip__icon">🌍</span>
          <span class="chip__text" id="world-holiday-main">—</span>
          <span class="chip__caret" aria-hidden="true">▾</span>
        </button>
      </div>

      <div class="info-panel" id="info-panel" hidden>
        <div class="info-panel__heading">🌍 Dnes se ve světě slaví</div>
        <ul class="info-panel__list" id="world-holiday-list"></ul>
      </div>
    </div>

    <div class="weather-strip" id="weather-strip"></div>
  </header>

  <nav class="tabs" id="tabs-nav"></nav>

  <main id="content" class="content">
    <div class="loading">Načítám zprávy…</div>
  </main>

  <div class="dock" id="dock"></div>

  <footer class="footer">
    <span id="generated-at" class="footer__info">—</span>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
