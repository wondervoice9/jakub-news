name: Build Android APK

# Builds a signed TWA-wrapped APK from the deployed PWA.
# Requires these repo secrets:
#   TWA_KEYSTORE_BASE64    — base64-encoded .keystore file
#   TWA_KEYSTORE_PASSWORD  — keystore password
#   TWA_KEY_PASSWORD       — key password (same as keystore for PKCS12)

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - "twa-manifest.json"
      - ".github/workflows/apk.yml"

concurrency:
  group: apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-33 build-tools;33.0.2"

      - name: Create legacy tools/ symlink for Bubblewrap SDK check
        run: |
          # Bubblewrap still looks for $ANDROID_HOME/tools/bin/sdkmanager,
          # but setup-android only installs cmdline-tools. Link it so the
          # doctor check passes.
          if [ ! -e "$ANDROID_HOME/tools" ]; then
            ln -s "$ANDROID_HOME/cmdline-tools/latest" "$ANDROID_HOME/tools"
          fi
          ls -la "$ANDROID_HOME/tools/bin" | head

      - name: Install Bubblewrap libraries
        run: |
          npm install -g @bubblewrap/cli@latest
          # Also install @bubblewrap/core locally so scripts/generate-twa.mjs
          # can import it without relying on global resolution quirks.
          npm install --no-save @bubblewrap/core@latest

      - name: Pre-configure Bubblewrap (skip first-run prompts)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {"jdkPath": "$JAVA_HOME", "androidSdkPath": "$ANDROID_HOME"}
          EOF
          cat ~/.bubblewrap/config.json

      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.TWA_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
          ls -la android.keystore

      - name: Generate Android project from twa-manifest.json
        run: |
          node scripts/generate-twa.mjs
          ls -la
          test -f build.gradle || test -f app/build.gradle

      - name: Build signed APK + AAB
        env:
          # Bubblewrap reads these env vars directly — flags aren't reliably
          # plumbed through across versions.
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.TWA_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.TWA_KEY_PASSWORD }}
        run: |
          # Bubblewrap asks "No checksum file — regenerate project?" (default Y).
          # We've just generated the project via generate-twa.mjs, so answer "n".
          echo "n" | bubblewrap build --skipPwaValidation

      - name: List build outputs
        run: ls -la *.apk *.aab 2>/dev/null || ls -la

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jakub-news-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
          if-no-files-found: error
          retention-days: 30
