name: Deploy PWA to GitHub Pages

# Deploys /frontend to GitHub Pages.
# GitHub Pages can only serve from repo root or /docs natively, so we use
# the official Actions-based deployment to publish an arbitrary folder.
#
# Triggers:
#   1. Push to main (when a real user edits frontend/** or this workflow)
#   2. After Daily aggregator workflow finishes — it commits via GITHUB_TOKEN,
#      whose pushes do NOT trigger other workflows. The workflow_run trigger
#      is the official escape hatch for this.
on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Daily aggregator"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./frontend"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
