name: Weekly COT fetch (Gold)

# CFTC releases the COT report every Friday around 15:30 ET (19:30 UTC winter
# / 20:30 UTC summer). We fire on Friday 21:00 UTC so the report is live.
# Saturday 09:00 UTC and Monday 09:00 UTC are fallbacks for weeks when the
# Friday release is pushed by a US holiday.
on:
  schedule:
    - cron: "0 21 * * 5"
    - cron: "0 9 * * 6"
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

jobs:
  fetch-cot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run COT fetcher
        run: python -m aggregator.cot_fetcher

      - name: Run unit tests
        run: python -m pytest tests/test_cot_analysis.py -q

      - name: Commit refreshed cot_gold.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/cot_gold.json
          if git diff --staged --quiet; then
            echo "No COT changes to commit (likely no new report yet)."
          else
            git commit -m "chore: weekly COT refresh [$(date -u +%Y-%m-%dT%H:%MZ)]"
            git push
          fi
