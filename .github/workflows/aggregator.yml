name: Daily aggregator

# Runs every day around 07:00 Europe/Prague local time.
# Cron is UTC-only, so we fire twice to cover both DST variants:
#   05:00 UTC = 07:00 CEST (summer)
#   06:00 UTC = 07:00 CET  (winter)
# Workflow is idempotent — running twice/day just refreshes data.json.
on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run aggregator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m aggregator.main

      - name: Commit refreshed data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily data refresh [$(date -u +%Y-%m-%dT%H:%MZ)]"
            git push
          fi
