name: Daily aggregator

# Goal: fresh data.json ready BEFORE 07:00 Europe/Prague every morning.
#
# GitHub's free scheduler has no SLA — runs at minute :00 sit in the most
# congested slot and are routinely delayed 1-4h. We work around that with:
#   1. Early start (well before 07:00 local) so even a delayed run finishes in time.
#   2. Off-peak minute (:23, not :00) to avoid the top-of-hour queue.
#   3. Several attempts — the aggregator is idempotent, so redundant runs just
#      refresh data.json; we only need one to land before 07:00.
#
# Times below in UTC → local (CEST = UTC+2 summer / CET = UTC+1 winter):
#   02:23 UTC = 04:23 CEST / 03:23 CET
#   03:23 UTC = 05:23 CEST / 04:23 CET
#   04:23 UTC = 06:23 CEST / 05:23 CET
on:
  schedule:
    - cron: "23 2 * * *"
    - cron: "23 3 * * *"
    - cron: "23 4 * * *"
  workflow_dispatch: {}

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run aggregator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m aggregator.main

      - name: Commit refreshed data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily data refresh [$(date -u +%Y-%m-%dT%H:%MZ)]"
            git push
          fi
